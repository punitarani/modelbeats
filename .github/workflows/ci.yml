name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Exactly what `bun run ci` runs locally: typecheck → lint → test → build.
      # Keep this a single script call so local and CI can never drift.
      - name: CI checks
        run: bun run ci

      - name: Generated Worker types are current
        working-directory: apps/web
        run: bunx wrangler types --check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      # Exactly what `bun run e2e` runs locally: publish local data, then Playwright
      # against the built preview in workerd.
      - name: End-to-end tests
        run: bun run e2e
