name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Exactly what `bun run ci` runs locally: typecheck → lint → test → build → budgets.
      # Keep this a single script call so local and CI can never drift.
      - name: CI checks
        run: bun run ci

      - name: Generated Worker types are current
        working-directory: apps/web
        run: bunx wrangler types --check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      # Exactly what `bun run e2e` runs locally: publish local data, then Playwright
      # against the built preview in workerd.
      - name: End-to-end tests
        run: bun run e2e

  # Continuous deployment: every push to main that passes ci + e2e ships to production.
  # A merge touching only data/** redeploys the same Worker and publishes a new catalog
  # snapshot — same job, no separate path. Runs `bun run deploy:production`, which does
  # migrate remote D1 → build → wrangler deploy → publish data (seed + KV snapshot + bump).
  #
  # Requires two GitHub Actions secrets: CLOUDFLARE_API_TOKEN (Workers Scripts + D1 + KV
  # edit scopes) and CLOUDFLARE_ACCOUNT_ID. The `production` environment lets you attach a
  # required-reviewer approval gate in repo settings without touching this file.
  deploy:
    needs: [ci, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN secret is not set — skipping the production deploy until the one-time Cloudflare bootstrap in docs/DEPLOY.md is complete. CI + e2e still gate every push; this job activates automatically once the secret exists."
            exit 0
          fi
          bun run deploy:production
